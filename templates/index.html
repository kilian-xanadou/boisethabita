<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Bois & Habitat - Ambiose</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000000; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        #image-container {
            width: 100%; height: 100%;
            background-size: contain; background-repeat: no-repeat; background-position: center;
            transition: background-image 1s ease-in-out;
        }
        .watermark {
            position: absolute; bottom: 30px; right: 30px;
            max-height: 80px; width: auto; opacity: 0.6; z-index: 10;
        }
    </style>
</head>
<body>
    <div id="image-container"></div>
    <img src="{{ url_for('static', filename='images/logo.png') }}" class="watermark" alt="Ambiose">

    <script>
        const toutesLesImages = {{ toutes_les_images | tojson | safe }};
        const imageContainer = document.getElementById('image-container');
        let diaporamaInterval;
        let indexImageActuelle = 0;

        function afficherImage(url) {
            imageContainer.style.backgroundImage = `url('${url}')`;
        }

        function demarrerDiaporama(images) {
            clearInterval(diaporamaInterval);
            if (!images || images.length === 0) return;
            afficherImage(images[0]);
            if (images.length > 1) {
                indexImageActuelle = 0;
                diaporamaInterval = setInterval(() => {
                    indexImageActuelle = (indexImageActuelle + 1) % images.length;
                    afficherImage(images[indexImageActuelle]);
                }, 5000);
            }
        }

        demarrerDiaporama(toutesLesImages);

        const socket = io();
        socket.on('connect', function() { console.log("📺 TV Connectée !"); });

        socket.on('lancer_diaporama', function(data) {
            if (data.is_idle) {
                demarrerDiaporama(data.urls);
            } else {
                clearInterval(diaporamaInterval);
                afficherImage(data.urls[0]);
            }
        });
    </script>
</body>
</html>
